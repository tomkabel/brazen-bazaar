items:
  - id: shell-scripting
    description: >
      Use this skill whenever someone asks to write, debug, or improve a bash or zsh script — whether it's a one-liner,
      a CI/CD pipeline, an SSH automation across multiple servers, or a full CLI tool. This skill triggers on: writing
      shell scripts from scratch, parsing command-line arguments (--input, --output, --verbose flags), handling errors
      and exit codes, processing files (CSV, log files, config files), using trap for cleanup on failure, creating
      timestamped backups, running commands in parallel across multiple hosts, and automating any CLI workflow. Also use
      when asking about shell concepts like here documents, process substitution, subshells, signal trapping, or how to
      safely handle whitespace/ filenames with spaces. Explicitly DO NOT trigger for Python or Node.js CLI tools — those
      use cases belong in their own language ecosystems.
    category: development
    license: MIT
    compatibility: Requires bash or zsh on a Unix-like shell environment.
