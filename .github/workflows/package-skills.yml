name: Package Skills

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "bin/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package all skills
        id: package
        run: |
          shopt -s nullglob
          mkdir -p dist
          for skill_dir in skills/*/; do
            # Skip hidden directories
            skill=$(basename "$skill_dir")
            if [[ "$skill" == .* ]]; then
              continue
            fi
            echo "Packaging: $skill"
            tar -czf "dist/${skill}.tar.gz" -C skills "$skill"
            sha256sum "dist/${skill}.tar.gz" > "dist/${skill}.tar.gz.sha256"
            echo "Created: dist/${skill}.tar.gz"
          done
          if ! compgen -G "dist/*.tar.gz" > /dev/null; then
            echo "No skills to package"
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_files=true" >> "$GITHUB_OUTPUT"
          ls -la dist/

      - name: Get version info
        if: steps.package.outputs.has_files == 'true'
        id: version
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create release
        if: steps.package.outputs.has_files == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: skills-${{ steps.version.outputs.date }}-${{ steps.version.outputs.sha_short }}
          name: Skills Release ${{ steps.version.outputs.date }}
          body: |
            Automated skills release from commit ${{ steps.version.outputs.sha }}
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release tag
        if: steps.package.outputs.has_files == 'true'
        run: |
          # Also upload to a "latest" release for easy access
          gh release upload skills-latest dist/*.tar.gz dist/*.tar.gz.sha256 --clobber 2>/dev/null || \
          gh release create skills-latest dist/*.tar.gz dist/*.tar.gz.sha256 \
            --title "Latest Skills" \
            --notes "Latest packaged skills. Updated automatically."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
